<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Life of mbs & veer</title>
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alice&display=swap" rel="stylesheet">
  <style>
   
    body {
      margin: 0;
     
  font-family: "Alice", serif;
  font-weight: 400;
  font-style: normal;
}

      
   

    .overlay {
      background: #f5f5f7;
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }

    .diary {
      width: 700px;
      max-width: 95%;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: normal;
    }

    .entry {
      padding: 15px 0;
      line-height: 1.6;
    }

    .date {
      font-weight: bold;
      margin-bottom: 5px;
    }

    /* Thin line between entries */
    .entry + .entry {
      border-top: 1px solid #1f1f21;
    }

    .loader {
      text-align: center;
      padding: 20px;
      color: gray;
      display: none;
    }
/* Container - Clean, left-aligned or centered, spacious */
.blog-title {
  text-align: left; /* GatesNotes often aligns left or center-left */
  margin: 60px 0 20px 0;
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  border-bottom: 1px solid #535353; /* Subtle editorial line */
  padding-bottom: 10px;
  max-width: fit-content;
}

/* Base style for all spans to ensure editorial consistency */
.blog-title span {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  color: #000;
  letter-spacing: -0.02em;
  transition: color 0.2s ease;
}

/* "The" - Subtle and light */
.word1 {
  font-weight: 300;
  font-size: 1.5rem;
  text-transform: uppercase;
  margin-right: 8px;
  color: #666 !important;
}

/* "Blog" - Bold and Authoritative */
.word2 {
  font-weight: 800;
  font-size: 2.5rem;
  margin-right: 8px;
}

/* "of" - Italic Serif (The 'Editorial' touch) */
.word3 {
  font-family: 'Merriweather', serif !important;
  font-style: italic;
  font-weight: 400;
  font-size: 1.8rem;
  margin-right: 10px;
  color: #333 !important;
}

/* "Veer" - The Signature Blue */
.word4 {
  font-weight: 800;
  font-size: 2.5rem;
  color: #005596 !important; /* Classic GatesNotes Blue */
}

/* Hover effect - Subtle color shift instead of scaling */
.blog-title:hover .word4 {
  color: #003d6b !important;
}

/* Import Clean Fonts */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;800&family=Merriweather:ital,wght@1,400&display=swap');
  /* Mobile optimizations */
@media (max-width: 768px) {
  .overlay {
    padding: 20px 10px;
  }
  .entry {
    padding: 10px 0;
  }
}
  </style>
</head>

<body>

<div class="overlay">
  <div class="diary">
    <h1 class="blog-title">
  
  <span class="word2">mbs & veer</span>
 
</h1>
    <div id="entries"></div>
    <div class="loader" id="loader">Loading more...</div>
  </div>
</div>

<script>
const diaryEntries = [
  { 
    date: "March 22, 2026", 
    text: `I did not know I would miss the rain this way. In my homeland Kerala, it was never something to think about. It arrived as part of the order of things, like dusk following day, like the slow swelling of rivers that had done this for centuries before us. The land knew what to do with it. So did we.<br><br><img src="sibi_1.jpg" alt="My Son playing in the stream near my aunt's home in Wayanad" style="width: 100%; height: auto;"><br><em>My Son playing in the stream near my aunt's home in Wayanad</em><br><br>

    Here, in the Gulf, the sky remains stubbornly clear. Weeks pass, then months, and nothing falls. The earth does not expect it. There is no waiting, no scent rising in anticipation, no darkening horizon promising relief. The air is dry, almost careful, as though it has learned to live without excess.<br><br>

    What I miss most is the green. In Kerala, green was not a colour but a presence. It pressed close—along roads, across fields, over water—softening everything it touched. It made distances seem shorter, life more contained. Here, the land stretches out in browns and pale yellows, open and unyielding, as if it has chosen endurance over abundance.<br><br>

    Sometimes, I think of the rain not as weather, but as a kind of inheritance. It shaped the way we moved, the way we waited, the way we understood time. A sudden downpour was never an interruption; it was part of a longer story the land was always telling. You stepped aside, watched it pass, and carried on.<br><br>

    In its absence, something feels incomplete—not dramatically, but quietly, like a familiar sound that has stopped without notice. Life continues, of course. Work fills the days, the routines settle in. But somewhere beneath it all is the memory of water falling steadily, of a landscape that answered it with life.<br><br>

    I realise now that I did not simply leave a place behind. I left a climate, a rhythm, a way of being shaped by rain. And here, under this unbroken sky, I find myself waiting for something that does not come.` 
  }
];

let currentIndex = 0;

function renderEntries(count = 3) {
  const container = document.getElementById("entries");

  for (let i = 0; i < count; i++) {
    if (currentIndex >= diaryEntries.length) return;

    const data = diaryEntries[currentIndex];

    const entry = document.createElement("div");
    entry.className = "entry";

    entry.innerHTML = `
      <div class="date">${data.date}</div>
      <div>${data.text}</div>
    `;

    container.appendChild(entry);
    currentIndex++;
  }
}

// Initial entries
renderEntries(5);

// Infinite scroll
window.addEventListener("scroll", () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 50) {
    loadMore();
  }
});

let loading = false;

function loadMore() {
  if (loading) return;
  if (currentIndex >= diaryEntries.length) return;

  loading = true;
  document.getElementById("loader").style.display = "block";

  setTimeout(() => {
    renderEntries(2);
    loading = false;

    if (currentIndex >= diaryEntries.length) {
      document.getElementById("loader").innerText = "End of diary";
    }
  }, 600);
}
</script>

</body>
</html>
